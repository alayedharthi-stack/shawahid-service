<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#0f5e57">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="refresh" content="1; url={{ pdf_url }}">
  <title>جاري تجهيز ملف الشواهد…</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      width: 100%;
      background: #0f5e57;
      color: #ffffff;
      font-family: 'Cairo', 'Tajawal', 'IBM Plex Sans Arabic', 'Tahoma', 'Arial', sans-serif;
      direction: rtl;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      background:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,0.04), transparent 40%),
        radial-gradient(circle at 90% 88%, rgba(214,168,74,0.08), transparent 38%),
        #0f5e57;
    }
    .brand {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .brand-sub {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.62);
      letter-spacing: 1.5px;
      margin-bottom: 36px;
      text-transform: uppercase;
    }
    .ring {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.18);
      border-top-color: #d6a84a;
      animation: spin 1s linear infinite;
      margin-bottom: 28px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .hint {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.72);
      line-height: 1.6;
      max-width: 320px;
      margin-bottom: 28px;
    }
    .fallback {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }
    .fallback a {
      color: #e2b85b;
      font-weight: 700;
      text-decoration: none;
      border-bottom: 1px dashed rgba(226,184,91,0.5);
      padding-bottom: 1px;
    }
    .fallback a:hover { color: #f0c97a; }
    .footer {
      position: fixed;
      bottom: 16px;
      left: 0; right: 0;
      text-align: center;
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.4px;
    }
  </style>
</head>
<body>
  <div class="brand">شواهد</div>
  <div class="brand-sub">SHAWAHID</div>

  <div class="ring" aria-hidden="true"></div>

  <div class="title">جاري تجهيز ملف الشواهد…</div>
  <div class="hint">قد يستغرق ذلك بضع ثوانٍ بحسب سرعة الاتصال.<br>سيبدأ التحميل تلقائيًا.</div>

  <div class="fallback">
    لم يبدأ التحميل؟ <a href="{{ pdf_url }}" rel="noopener">اضغط هنا</a>
  </div>

  <div class="footer">© شواهد · Ministry of Education portfolio service</div>

  <script>
    // Auto-redirect immediately on JS-capable clients (the meta refresh is the
    // fallback for clients that block JS or fail mid-redirect).
    (function () {
      var url = "{{ pdf_url|safe }}";
      // Small delay so the spinner is visible at least one frame.
      setTimeout(function () {
        try { window.location.replace(url); }
        catch (e) { window.location.href = url; }
      }, 600);
    })();
  </script>
</body>
</html>
